<table>
  <tr>
    <th>{{ timeline.name }}</th>
    @for (cell of yearsWithEvents(); track cell.year) {
      <td [class.hasEvent]="cell.hasEvent" [title]="cell.eventName"></td>
    }
  </tr>
</table>

@if (showYearsPerCellLegend) {
  <p class="timeline-legend">Cada célula representa {{ yearsPerCellLabel }}.</p>
}
